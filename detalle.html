<!DOCTYPE html>

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bioliffe - Detalle del Producto</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --verde: #00d96a; --glow-soft: 0 0 12px #00d96a55; }

    body {
      font-family: 'Comfortaa', cursive;
      background: #ffffff;
      color: #0a2e14;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before { display: none; }

    header { position: relative; z-index: 10; text-align: center; padding: 28px 20px 10px; }

    .logo-text {
      height: 72px; width: 200px;
      object-fit: contain; mix-blend-mode: multiply;
      animation: pulso 3s ease-in-out infinite;
    }
    @keyframes pulso { 0%,100%{opacity:1} 50%{opacity:.82} }

    .btn-volver {
      position: relative; z-index: 10;
      display: inline-flex; align-items: center; gap: 8px;
      margin: 14px 20px; padding: 8px 18px;
      background: white; border: 2px solid #e0ede5; border-radius: 20px;
      text-decoration: none; color: #0a2e14;
      font-family: 'Comfortaa', cursive; font-size: 0.83rem;
      font-weight: 600; letter-spacing: 1px; transition: all 0.3s;
    }
    .btn-volver:hover { border-color: var(--verde); color: var(--verde); box-shadow: var(--glow-soft); }

    .linea-glow {
      width: 80%; max-width: 500px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--verde), transparent);
      margin: 8px auto 26px; box-shadow: var(--glow-soft);
    }

    .contenido {
      position: relative; z-index: 10;
      max-width: 920px; margin: 0 auto; padding: 0 16px 40px;
    }

    /* LAYOUT DOS COLUMNAS: info izq | imagen der */
    .prod-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      align-items: start;
      margin-bottom: 20px;
    }

    /* COLUMNA IZQUIERDA — info */
    .prod-col-info { display: flex; flex-direction: column; gap: 0; }

    /* COLUMNA DERECHA — imagen */
    .prod-img-wrap {
      border: 2px solid #e0ede5;
      border-radius: 18px; overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      background: #f8fdf9;
      position: sticky; top: 20px;
    }
    .prod-img-wrap img {
      width: 100%;
      height: 380px;
      object-fit: contain;
      object-position: center;
      display: block;
      padding: 14px;
    }

    @media (max-width: 640px) {
      .prod-layout {
        grid-template-columns: 1fr;
      }
      .prod-img-wrap img { height: 260px; }
      .prod-img-wrap { position: static; }
    }

    /* CABECERA INFO */
    .info-box {
      background: white; border: 2px solid #e0ede5;
      border-radius: 16px; padding: 20px 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .info-cat {
      font-size: 0.66rem; letter-spacing: 3px;
      color: var(--verde); text-transform: uppercase;
      font-weight: 700; margin-bottom: 6px;
      text-shadow: 0 0 8px #00d96a66;
    }

    .info-nombre {
      font-size: 1.2rem; font-weight: 700;
      color: #0a2e14; line-height: 1.3; margin-bottom: 10px;
    }

    .info-presentacion {
      display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px;
    }
    .tag {
      background: #f0faf2; border: 1px solid #00d96a40;
      color: var(--verde); font-size: 0.72rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
    }

    .info-precio {
      font-size: 1.7rem; font-weight: 700; color: var(--verde);
      text-shadow: 0 0 14px #00d96a55;
    }

    /* DESCRIPCIÓN / BENEFICIOS */
    .seccion {
      background: white; border: 2px solid #e0ede5;
      border-radius: 16px; padding: 18px 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .sec-titulo {
      font-size: 0.70rem; letter-spacing: 3px;
      text-transform: uppercase; font-weight: 700;
      color: #0a2e14; margin-bottom: 12px;
      padding-bottom: 8px; border-bottom: 1px solid #e8f5e9;
    }
    .seccion p { font-size: 0.9rem; color: #222; line-height: 1.8; }

    .lista-benef { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .lista-benef li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.88rem; color: #222; line-height: 1.55;
    }
    .lista-benef li::before {
      content: '✦'; color: var(--verde); font-size: 0.65rem;
      margin-top: 5px; flex-shrink: 0;
      text-shadow: 0 0 8px #00d96a88;
    }

    /* ── BLOQUE WHATSAPP FINAL ── */
    .wa-bloque {
      background: #0a2e14;
      border: none;
      border-radius: 20px;
      padding: 28px 22px;
      text-align: center;
      margin-bottom: 30px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    }

    .wa-bloque p {
      font-size: 0.82rem; color: #c8f5d8;
      letter-spacing: 1px; margin-bottom: 18px;
      line-height: 1.6;
    }

    .wa-bloque .wa-titulo {
      font-size: 1rem; font-weight: 700; color: var(--verde);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 0 12px #00d96a88;
    }

    .btn-wa-grande {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #25D366; color: white;
      border: none; border-radius: 16px;
      padding: 18px 24px; width: 100%;
      font-family: 'Comfortaa', cursive;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 1px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.5);
      transition: all 0.3s; cursor: pointer;
    }
    .btn-wa-grande:hover {
      background: #1ebe5d;
      box-shadow: 0 6px 30px rgba(37,211,102,0.7);
      transform: translateY(-2px);
    }
    .btn-wa-grande svg { flex-shrink: 0; }

    .wa-nota {
      margin-top: 12px;
      font-size: 0.7rem; color: #00d96a66; letter-spacing: 1px;
    }

    footer {
      position: relative; z-index: 10; text-align: center;
      padding: 20px; font-size: 0.70rem; color: #00d96a66;
      letter-spacing: 2px; border-top: 1px solid #00d96a20;
    }

    @media (max-width: 480px) {
      .info-nombre { font-size: 1rem; }
      .info-precio { font-size: 1.4rem; }
      .btn-wa-grande { font-size: 0.88rem; padding: 16px 18px; }
      .prod-layout { grid-template-columns: 1fr; }
      .prod-img-wrap img { height: 240px; }
      .prod-img-wrap { position: static; }
    }
  </style>
</head>
