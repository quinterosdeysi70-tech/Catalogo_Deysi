<head>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --verde: #00d96a; --glow-soft: 0 0 12px #00d96a55; }

    body {
      font-family: 'Comfortaa', cursive;
      background: #ffffff;
      color: #0a2e14;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before { display: none; }

    header { position: relative; z-index: 10; text-align: center; padding: 28px 20px 10px; }
    .logo-text {
      height: 72px; width: 200px;
      object-fit: contain; mix-blend-mode: multiply;
      animation: pulso 3s ease-in-out infinite;
    }
    @keyframes pulso { 0%,100%{opacity:1} 50%{opacity:.82} }

    .btn-volver {
      position: relative; z-index: 10;
      display: inline-flex; align-items: center; gap: 8px;
      margin: 14px 20px; padding: 8px 18px;
      background: white; border: 2px solid #e0ede5; border-radius: 20px;
      text-decoration: none; color: #0a2e14;
      font-family: 'Comfortaa', cursive; font-size: 0.83rem;
      font-weight: 600; letter-spacing: 1px; transition: all 0.3s;
    }
    .btn-volver:hover { border-color: var(--verde); color: var(--verde); box-shadow: var(--glow-soft); }

    .linea-glow {
      width: 80%; max-width: 500px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--verde), transparent);
      margin: 8px auto 26px; box-shadow: var(--glow-soft);
    }

    .contenido {
      position: relative; z-index: 10;
      max-width: 680px; margin: 0 auto; padding: 0 16px 60px;
    }

    /* TÍTULO */
    .enf-titulo {
      text-align: center; margin-bottom: 24px;
    }
    .enf-titulo .icono { font-size: 2.4rem; display: block; margin-bottom: 10px; }
    .enf-titulo .pregunta {
      font-size: 0.9rem; letter-spacing: 1px;
      color: #0a2e14; font-weight: 700; margin-bottom: 4px;
    }
    .enf-titulo h2 {
      font-size: 1.55rem; font-weight: 700;
      color: #0a2e14; letter-spacing: 1px;
      line-height: 1.2; margin-bottom: 8px;
    }
    .enf-titulo .consume {
      font-size: 1rem; font-weight: 700;
      color: #0a2e14; letter-spacing: 1px;
      margin-bottom: 14px; display: block;
    }
    .productos-pills {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px; margin-bottom: 6px;
    }
    .pill {
      background: #f5f5f5; border: 2px solid #00d96a40;
      color: #0a2e14; font-size: 0.76rem; font-weight: 700;
      padding: 6px 14px; border-radius: 20px;
      box-shadow: 0 2px 8px #00d96a18;
    }
    .enf-titulo .linea {
      width: 60px; height: 3px; background: var(--verde);
      border-radius: 2px; margin: 16px auto 0; box-shadow: var(--glow-soft);
    }

    /* IMAGEN PRODUCTOS */
    .img-bloque { margin-bottom: 20px; }
    .img-bloque .img-label {
      font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase;
      color: var(--verde); font-weight: 700; margin-bottom: 8px;
      text-shadow: 0 0 8px #00d96a55;
    }
    .img-bloque img {
      width: 100%; border-radius: 16px;
      border: 2px solid #e0ede5;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09); display: block;
    }

    /* MÉTODO DE CONSUMO */
    .metodo-box {
      background: white; border: 2px solid #e0ede5;
      border-radius: 16px; padding: 20px 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .metodo-titulo {
      font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase;
      font-weight: 700; color: #0a2e14;
      padding-bottom: 12px; margin-bottom: 14px;
      border-bottom: 1px solid #e8f5e9;
    }
    .metodo-item {
      display: flex; gap: 12px; margin-bottom: 14px; align-items: flex-start;
    }
    .metodo-item:last-child { margin-bottom: 0; }
    .metodo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--verde); flex-shrink: 0; margin-top: 6px;
      box-shadow: 0 0 6px #00d96a88;
    }
    .metodo-prod {
      font-size: 0.78rem; font-weight: 700; color: var(--verde);
      margin-bottom: 3px;
    }
    .metodo-dosis {
      font-size: 0.82rem; color: #333; line-height: 1.55;
    }

    /* BLOQUE WHATSAPP */
    .wa-bloque {
      background: #0a2e14; border-radius: 20px;
      padding: 26px 20px; text-align: center;
      margin-top: 4px; box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    }
    .wa-titulo {
      font-size: 1rem; font-weight: 700; color: var(--verde);
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 6px; text-shadow: 0 0 12px #00d96a88;
    }
    .wa-bloque p {
      font-size: 0.82rem; color: #c8f5d8;
      letter-spacing: 1px; margin-bottom: 18px; line-height: 1.6;
    }
    .btn-wa-grande {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #25D366; color: white; border: none; border-radius: 14px;
      padding: 16px 24px; width: 100%;
      font-family: 'Comfortaa', cursive; font-size: 0.95rem; font-weight: 700;
      letter-spacing: 1px; text-decoration: none;
      box-shadow: 0 4px 20px rgba(37,211,102,0.5); transition: all 0.3s;
    }
    .btn-wa-grande:hover {
      background: #1ebe5d;
      box-shadow: 0 6px 30px rgba(37,211,102,0.7);
      transform: translateY(-2px);
    }

    footer {
      position: relative; z-index: 10; text-align: center;
      padding: 20px; font-size: 0.70rem; color: #00d96a66;
      letter-spacing: 2px; border-top: 1px solid #00d96a20;
    }

      .enf-titulo h2 { font-size: 1.2rem; }
    }
  </style>
</head>
